<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1D6F42"/>
  <!-- Wrench icon -->
  <g fill="#fff" transform="translate(256,235) rotate(-45)">
    <!-- Handle -->
    <rect x="-18" y="-10" width="36" height="160" rx="10"/>
    <!-- Head circle with jaw opening -->
    <circle cx="0" cy="-65" r="70" fill="#fff"/>
    <circle cx="0" cy="-65" r="38" fill="#1D6F42"/>
    <!-- Jaw opening cut -->
    <rect x="-16" y="-145" width="32" height="50" fill="#1D6F42"/>
  </g>
  <!-- akira text -->
  <text x="256" y="458" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="58" font-weight="700" fill="#fff" letter-spacing="4">akira</text>
</svg>
